<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">

        <h1>✦ Do Your Calc ✦</h1>

        <input type="text" id="display" disabled>

        <div class="buttons">

            <!-- Row 1 -->

            <button class="special" onclick="clearDisplay()">AC</button>
            <button class="special" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendValue('%')">%</button>
            <button class="operator" onclick="appendValue('/')">÷</button>

            <!-- Row 2 -->

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">×</button>

            <!-- Row 3 -->

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">−</button>

            <!-- Row 4 -->

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <!-- Row 5 -->

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculate()">=</button>

            <!-- Scientific -->

            <button class="science" onclick="appendValue('Math.sqrt(')">√</button>
            <button class="science" onclick="appendValue('**')">x²</button>
            <button class="science" onclick="appendValue('Math.sin(')">sin</button>
            <button class="science" onclick="appendValue('Math.cos(')">cos</button>

            <button class="science" onclick="appendValue('Math.tan(')">tan</button>
            <button class="science" onclick="appendValue('Math.log(')">log</button>
            <button class="science" onclick="appendValue('Math.PI')">π</button>
            <button class="science" onclick="appendValue('Math.E')">e</button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
